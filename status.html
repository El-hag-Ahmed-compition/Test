<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استعلام عن النتيجة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { background-color: #002D04; margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* واجهة الاستعلام (نفس صورة الموبايل بالظبط) */
        .main-container { width: 95%; max-width: 400px; border: 2px solid #D4AF37; border-radius: 20px; padding: 20px; margin-top: 30px; text-align: center; }
        .title { color: #D4AF37; font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        .search-row { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; text-align: center; font-size: 16px; font-weight: bold; }
        .btn-search { background-color: #D4AF37; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* كارت النتيجة الأبيض */
        #resultDisplay { 
            display: none; 
            background-color: white; 
            border-radius: 15px; 
            padding: 20px; 
            text-align: right; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .student-name { font-size: 20px; font-weight: bold; color: black; margin-bottom: 15px; }
        .info-item { color: #333; margin-bottom: 8px; font-size: 16px; font-weight: bold; }
        .status-green { color: #28a745; } /* قيد المراجعة */
        .status-blue { color: #007bff; }  /* قيد الانتظار */

        /* زرار التحميل الأخضر (الهدف المطلوب) */
        .btn-download-green { 
            background-color: #002D04; 
            color: #D4AF37; 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* --- تصميم الكارت "المخفي" اللي هيتم تصويره ونزوله للموبايل --- */
        #finalCardTemplate {
            position: absolute; left: -9999px; /* مخفي عن العين بس موجود للكود */
            width: 600px; height: 300px; background-color: white;
        }
        .card-top { background-color: #002D04; color: #D4AF37; padding: 10px; text-align: center; font-weight: bold; font-size: 22px; border-bottom: 4px solid #D4AF37; }
        .card-middle { display: flex; padding: 20px; align-items: center; justify-content: space-between; }
        .card-info { text-align: right; color: black; font-size: 18px; font-weight: bold; line-height: 1.8; }
        .card-qr { width: 140px; height: 140px; border: 2px solid #002D04; }
        .card-bottom { background-color: #D4AF37; color: black; padding: 8px; text-align: center; font-weight: bold; font-size: 16px; position: absolute; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="title">استعلام عن نتيجة</div>
        <div class="search-row">
            <button class="btn-search" onclick="checkCode()">بحث</button>
            <input type="text" id="codeInput" placeholder="أدخل الكود (مثل M-2625)">
        </div>

        <div id="resultDisplay">
            <div class="student-name" id="resName"></div>
            <div class="info-item">المستوى: <span id="resLevel"></span></div>
            <div class="info-item">المرحلة الأولى: <span class="status-green" id="resScore1"></span></div>
            <div class="info-item">المرحلة الثانية: <span class="status-blue" id="resScore2"></span></div>

            <button class="btn-download-green" onclick="generateAndDownload()">
                تحميل الكارت ⬇️
            </button>
        </div>
    </div>

    <div id="finalCardTemplate">
        <div class="card-top">بطاقة متسابق | مسجد الحاج أحمد الملهود</div>
        <div class="card-middle">
            <div id="qrPlaceholder" class="card-qr"></div>
            <div class="card-info">
                <div>الاسم: <span id="cardName"></span></div>
                <div>النوع: ذكر</div>
                <div>المستوى: <span id="cardLevel"></span></div>
                <div style="color:#D4AF37">الكود: <span id="cardCode"></span></div>
            </div>
        </div>
        <div class="card-bottom">يرجى إبراز الكارت عند دخول الاختبارات</div>
    </div>

    <script>
        // دالة البحث والربط مع الشيت
        function checkCode() {
            const code = document.getElementById('codeInput').value;
            const scriptURL = "https://script.google.com/macros/s/AKfycbyMdgVqMzzZv6dLIn5L4xsqK5ZjaY3ZmfddqwCw-yARPcq52XX-K-24IRmoJhuX_6KPLQ/exec"; // حط الرابط بتاعك هنا

            if(!code) return alert("من فضلك دخل الكود!");

            // جلب البيانات
            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "found") {
                    // عرض البيانات في الصفحة
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resLevel').innerText = data.level;
                    document.getElementById('resScore1').innerText = data.score1 || "قيد المراجعة";
                    document.getElementById('resScore2').innerText = data.score2 || "قيد الانتظار";
                    
                    // تجهيز الكارت المخفي بالبيانات
                    document.getElementById('cardName').innerText = data.name;
                    document.getElementById('cardLevel').innerText = data.level;
                    document.getElementById('cardCode').innerText = "T-" + code;
                    
                    // توليد الـ QR داخل الكارت المخفي
                    $('#qrPlaceholder').empty().qrcode({ text: code, foreground: "#002D04", width: 140, height: 140 });

                    document.getElementById('resultDisplay').style.display = "block";
                } else {
                    alert("عفواً.. الكود غير موجود أو خطأ");
                }
            });
        }

        // دالة الزرار الأخضر: تحويل القالب المخفي لصورة وتحميلها فوراً
        function generateAndDownload() {
            const card = document.getElementById('finalCardTemplate');
            const name = document.getElementById('resName').innerText;

            html2canvas(card, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `كارت_${name}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>

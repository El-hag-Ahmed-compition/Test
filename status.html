<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بطاقة متسابق | مسجد الحاج أحمد الملهود</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { background-color: #002D04; margin: 0; padding: 15px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* صندوق البحث */
        .search-container { width: 100%; max-width: 400px; text-align: center; margin-bottom: 25px; border: 2px solid #D4AF37; border-radius: 12px; padding: 20px; color: white; box-sizing: border-box; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 16px; text-align: center; }
        .btn-search { width: 100%; padding: 12px; background-color: #D4AF37; color: #002D04; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* تصميم الكارت المعتمد (نفس شكل الصورة بالظبط) */
        #cardWrapper { display: none; width: 100%; max-width: 500px; background-color: white; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .card-header { background-color: #002D04; color: #D4AF37; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-bottom: 5px solid #D4AF37; }
        .card-body { display: flex; padding: 25px 15px; align-items: center; justify-content: space-between; }
        
        /* مكان الـ QR Code */
        .qr-section { width: 40%; display: flex; justify-content: center; align-items: center; }
        #qrcode canvas { width: 100% !important; height: auto !important; max-width: 140px; border: 3px solid #002D04; border-radius: 5px; }
        
        /* مكان البيانات */
        .info-section { width: 55%; text-align: right; line-height: 1.8; font-size: 18px; color: black; font-weight: bold; }
        .info-label { color: black; }
        .info-value { color: #002D04; margin-right: 5px; }
        .card-footer { background-color: #D4AF37; color: #002D04; padding: 10px; text-align: center; font-weight: bold; font-size: 15px; border-top: 2px solid #002D04; }

        /* زرار تحميل الكارت (اللي كان تايه) */
        #downloadBtn { 
            display: none; 
            margin-top: 25px; 
            width: 100%; max-width: 400px; 
            padding: 15px; 
            background-color: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h2 style="color:#D4AF37; margin-top:0;">الاستعلام عن الكارت</h2>
        <input type="text" id="studentCodeInput" placeholder="أدخل كود الطالب (مثلاً: 11001)">
        <button class="btn-search" onclick="searchStudent()" id="mainSearchBtn">استعلام وتحميل</button>
    </div>

    <div id="cardWrapper">
        <div class="card-header">بطاقة متسابق | مسجد الحاج أحمد الملهود</div>
        <div class="card-body">
            <div class="qr-section" id="qrcode"></div>
            <div class="info-section">
                <div><span class="info-label">الاسم:</span> <span id="dispName" class="info-value"></span></div>
                <div><span class="info-label">النوع:</span> <span id="dispGender" class="info-value"></span></div>
                <div><span class="info-label">المستوى:</span> <span id="dispLevel" class="info-value"></span></div>
                <div><span class="info-label">الكود:</span> <span id="dispCode" class="info-value" style="color:#D4AF37;"></span></div>
            </div>
        </div>
        <div class="card-footer">يرجى إبراز الكارت عند دخول الاختبارات</div>
    </div>

    <button id="downloadBtn" onclick="saveCardAsImage()">⬇️ تحميل الكارت (صورة PNG)</button>

    <script>
        function searchStudent() {
            const code = document.getElementById('studentCodeInput').value;
            const btn = document.getElementById('mainSearchBtn');
            const scriptURL = "https://script.google.com/macros/s/AKfycbyMdgVqMzzZv6dLIn5L4xsqK5ZjaY3ZmfddqwCw-yARPcq52XX-K-24IRmoJhuX_6KPLQ/exec"; // استبدله برابط الـ Script بتاعك

            if(!code) {
                alert("يا هندسة اكتب الكود الأول!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري البحث...";

            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "استعلام وتحميل";
                
                if(data.status === "found") {
                    // ملء البيانات في الكارت
                    document.getElementById('dispName').innerText = data.name;
                    document.getElementById('dispGender').innerText = data.gender || "ذكر";
                    document.getElementById('dispLevel').innerText = data.level;
                    document.getElementById('dispCode').innerText = "T-" + code;

                    // توليد الـ QR Code
                    $('#qrcode').empty().qrcode({
                        text: `Name: ${data.name}\nLevel: ${data.level}\nCode: ${code}`,
                        foreground: "#002D04"
                    });

                    // إظهار الكارت وزرار التحميل
                    document.getElementById('cardWrapper').style.display = "block";
                    document.getElementById('downloadBtn').style.display = "block";
                    
                    // تحريك الشاشة للكارت
                    document.getElementById('cardWrapper').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("عفواً.. الكود غير موجود أو خطأ");
                    document.getElementById('cardWrapper').style.display = "none";
                    document.getElementById('downloadBtn').style.display = "none";
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerText = "استعلام وتحميل";
                alert("فيه مشكلة في الاتصال.. جرب تاني");
            });
        }

        // دالة تحويل الكارت لصورة وتحميلها
        function saveCardAsImage() {
            const card = document.getElementById('cardWrapper');
            const studentName = document.getElementById('dispName').innerText;
            
            html2canvas(card, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `كارت-${studentName}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>

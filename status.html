<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استعلام عن النتيجة</title>
    <style>
        body {
            background-color: #002D04;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #D4AF37;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { color: #D4AF37; margin-bottom: 25px; }
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #D4AF37;
            color: #002D04;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid #D4AF37;
            display: none; /* مخفي لحد ما البحث يخلص */
            text-align: right;
        }
        .info-item { margin-bottom: 10px; font-size: 16px; }
        .label { color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>الاستعلام عن الكود والنتيجة</h2>
    <input type="text" id="studentCode" placeholder="أدخل كودك (مثلاً: 11001)">
    <button onclick="checkStatus()" id="searchBtn">بحث الآن</button>

    <div id="result">
        <div class="info-item"><span class="label">الاسم: </span><span id="resName"></span></div>
        <div class="info-item"><span class="label">المستوى: </span><span id="resLevel"></span></div>
        <div class="info-item"><span class="label">المرحلة الأولى: </span><span id="resScore1"></span></div>
        <div class="info-item"><span class="label">المرحلة الثانية: </span><span id="resScore2"></span></div>
    </div>
</div>

<script>
    function checkStatus() {
        const code = document.getElementById('studentCode').value;
        const btn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');

        if (!code) {
            alert("من فضلك أدخل الكود أولاً");
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري البحث...";

        // ضع رابط الـ Web App الخاص بك هنا
        const scriptURL = "رابط_الـ_APPS_SCRIPT_الجديد_هنا";

        fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "بحث الآن";
                
                if (data.status === "found") {
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resLevel').innerText = data.level;
                    document.getElementById('resScore1').innerText = data.score1;
                    document.getElementById('resScore2').innerText = data.score2;
                    resultDiv.style.display = "block";
                } else {
                    alert("عفواً.. الكود غير موجود");
                    resultDiv.style.display = "none";
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerText = "بحث الآن";
                alert("خطأ في الاتصال بالخادم");
                console.error('Error!', error.message);
            });
    }
</script>

</body>
</html>

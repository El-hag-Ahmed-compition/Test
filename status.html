<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعلام المتسابقين | مسجد الملهود</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body { 
            background: #06301d; 
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        
        .search-area { 
            border: 2px solid #fdb931; 
            border-radius: 15px; 
            padding: 25px; 
            max-width: 400px; 
            margin: auto; 
            background: rgba(255,255,255,0.05);
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 8px;
            border: 1px solid #fdb931;
            margin-bottom: 10px;
            font-family: 'Cairo', sans-serif;
        }

        .btn-search {
            padding: 12px 30px;
            background: #fdb931;
            color: #06301d;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
        }

        .res-info { 
            display: none; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 20px; 
            text-align: right; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* تنسيق الكارت المخفي اللي هيتحمل كصورة */
        #finalCard { 
            width: 450px; 
            background: #fff; 
            color: #000; 
            border: 4px solid #06301d; 
            position: absolute; 
            left: -9999px; 
            font-family: 'Cairo', sans-serif;
        }

        .card-header {
            background: #06301d; 
            color: #fdb931; 
            padding: 15px; 
            font-weight: bold; 
            font-size: 1.1rem;
        }

        .card-footer {
            background: #fdb931; 
            color: #06301d; 
            padding: 5px; 
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="search-area">
        <h2 style="color:#fdb931">الاستعلام عن الكود والنتيجة</h2>
        <input type="text" id="cIn" placeholder="أدخل كودك (مثال: T-1234)">
        <br>
        <button class="btn-search" onclick="search()">بحث الآن</button>

        <div id="res" class="res-info">
            <h3 id="n" style="margin-top:0; color:#06301d;"></h3>
            <p>النوع: <b id="g"></b></p>
            <p>المستوى: <b id="l"></b></p>
            <p>المرحلة الأولى: <b id="s1" style="color:green;"></b></p>
            <p>المرحلة الثانية: <b id="s2" style="color:blue;"></b></p>
            <button onclick="draw()" style="width:100%; padding:15px; background:#06301d; color:#fdb931; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-family: 'Cairo';">تحميل كارت المتسابق ⬇️</button>
        </div>
    </div>

    <div id="finalCard">
        <div class="card-header">بطاقة متسابق | مسجد الحاج أحمد الملهود</div>
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <div id="ct" style="text-align:right; line-height:1.8; font-size: 1.1rem;"></div>
            <div id="cq" style="border: 2px solid #06301d; padding: 5px;"></div>
        </div>
        <div class="card-footer">يرجى إبراز الكارت عند دخول الاختبارات</div>
    </div>

    <script>
        // رابط الـ Web App الجديد الخاص بالشيت التجريبي
        const scriptURL = https://script.google.com/macros/s/AKfycbyMdgVqMzzZv6dLIn5L4xsqK5ZjaY3ZmfddqwCw-yARPcq52XX-K-24IRmoJhuX_6KPLQ/exec';
        let st = {};

        function search() {
            const code = document.getElementById('cIn').value.trim();
            if(!code) { alert("من فضلك أدخل الكود أولاً"); return; }

            document.querySelector('.btn-search').innerText = "جاري البحث...";
            
            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(r => r.json())
            .then(d => {
                document.querySelector('.btn-search').innerText = "بحث الآن";
                if(d.status === "found") {
                    st = d; 
                    st.code = code; // حفظ الكود لاستخدامه في الكارت
                    
                    document.getElementById('res').style.display = "block";
                    document.getElementById('n').innerText = d.name;
                    document.getElementById('g').innerText = d.gender; // عرض النوع
                    document.getElementById('l').innerText = d.level;
                    document.getElementById('s1').innerText = d.score1 || "قيد المراجعة";
                    document.getElementById('s2').innerText = d.score2 || "لم تبدأ بعد";
                } else { 
                    alert("عفواً.. الكود غير موجود أو خطأ"); 
                    document.getElementById('res').style.display = "none";
                }
            })
            .catch(err => {
                alert("خطأ في الاتصال بالخادم");
                document.querySelector('.btn-search').innerText = "بحث الآن";
            });
        }

        function draw() {
            // تعبئة بيانات الكارت
            document.getElementById('ct').innerHTML = `
                <b>الاسم:</b> ${st.name}<br>
                <b>النوع:</b> ${st.gender}<br>
                <b>المستوى:</b> ${st.level}<br>
                <b>الكود:</b> <span style="color:#b8860b; font-weight:bold;">${st.code}</span>
            `;
            
            // توليد الـ QR Code
            document.getElementById('cq').innerHTML = "";
            new QRCode(document.getElementById("cq"), { 
                text: st.code, 
                width: 100, 
                height: 100,
                colorDark : "#06301d",
                colorLight : "#ffffff"
            });

            // تحويل التصميم لصورة بعد وقت قصير للتأكد من رسم الـ QR
            setTimeout(() => {
                html2canvas(document.getElementById('finalCard'), { scale: 2 }).then(canvas => {
                    let a = document.createElement('a');
                    a.download = `كارت_${st.name}.png`;
                    a.href = canvas.toDataURL("image/png");
                    a.click();
                });
            }, 800);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استعلام عن النتيجة والكارت</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { background-color: #002D04; margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* صندوق البحث العلوي */
        .search-container { width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; border: 2px solid #D4AF37; border-radius: 15px; padding: 20px; color: white; box-sizing: border-box; }
        .search-row { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; text-align: center; }
        .btn-search { background-color: #D4AF37; color: #002D04; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* --- تصميم الكارت المعتمد (أبعاد 2:1) --- */
        #resultCard { 
            display: none; 
            width: 100%; 
            max-width: 600px; /* العرض */
            aspect-ratio: 2 / 1; /* نسبة العرض للطول زي ما طلبت */
            background-color: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            position: relative;
            flex-direction: column;
        }

        .card-header { background-color: #002D04; color: #D4AF37; padding: 10px; text-align: center; font-weight: bold; font-size: 1.2rem; border-bottom: 4px solid #D4AF37; }
        
        .card-body { display: flex; flex: 1; padding: 15px; align-items: center; justify-content: space-between; }
        
        /* قسم الـ QR */
        .qr-section { width: 35%; text-align: center; display: flex; justify-content: center; }
        #qrcode canvas { width: 100% !important; height: auto !important; max-width: 130px; border: 2px solid #002D04; padding: 5px; background: white; }

        /* قسم البيانات */
        .info-section { width: 60%; text-align: right; color: black; line-height: 1.6; }
        .student-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: #000; }
        .info-row { font-size: 1rem; margin-bottom: 5px; font-weight: bold; }
        .status-green { color: #28a745; } /* قيد المراجعة */
        .status-blue { color: #007bff; }  /* قيد الانتظار */
        .code-val { color: #D4AF37; font-size: 1.1rem; }

        .card-footer { background-color: #D4AF37; color: #002D04; padding: 8px; text-align: center; font-weight: bold; font-size: 0.9rem; }

        /* --- زرار التحميل الداخلي (الموجود في الصورة) --- */
        .btn-download-inside { 
            background-color: #002D04; 
            color: #D4AF37; 
            width: 90%; 
            margin: 5px auto 15px auto; 
            padding: 10px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h3 style="margin:0;">استعلام عن نتيجة</h3>
        <div class="search-row">
            <button class="btn-search" onclick="fetchStudentData()">بحث</button>
            <input type="text" id="inputCode" placeholder="أدخل كودك (مثلاً M-2625)">
        </div>
    </div>

    <div id="resultCard">
        <div class="card-header">بطاقة متسابق | مسجد الحاج أحمد الملهود</div>
        
        <div class="card-body">
            <div class="qr-section" id="qrcode"></div>
            
            <div class="info-section">
                <div class="student-name" id="resName"></div>
                <div class="info-row">المستوى: <span id="resLevel"></span></div>
                <div class="info-row">المرحلة الأولى: <span class="status-green" id="resStatus1"></span></div>
                <div class="info-row">المرحلة الثانية: <span class="status-blue" id="resStatus2"></span></div>
                <div class="info-row">الكود: <span class="code-val" id="resCode"></span></div>
            </div>
        </div>

        <button class="btn-download-inside" id="dlBtn" onclick="downloadAsImage()">
            تحميل الكارت ⬇️
        </button>

        <div class="card-footer">يرجى إبراز الكارت عند دخول الاختبارات</div>
    </div>

    <script>
        function fetchStudentData() {
            const code = document.getElementById('inputCode').value;
            const scriptURL = "https://script.google.com/macros/s/AKfycbyMdgVqMzzZv6dLIn5L4xsqK5ZjaY3ZmfddqwCw-yARPcq52XX-K-24IRmoJhuX_6KPLQ/exec"; // ضع رابط الـ Script الخاص بك هنا

            if(!code) return alert("من فضلك اكتب الكود!");

            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "found") {
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resLevel').innerText = data.level;
                    document.getElementById('resStatus1').innerText = data.score1 || "قيد المراجعة";
                    document.getElementById('resStatus2').innerText = data.score2 || "قيد الانتظار";
                    document.getElementById('resCode').innerText = "T-" + code;

                    // توليد الـ QR Code
                    $('#qrcode').empty().qrcode({ text: code, foreground: "#002D04" });

                    // إظهار الكارت
                    document.getElementById('resultCard').style.display = "flex";
                } else {
                    alert("عفواً.. الكود غير موجود");
                }
            });
        }

        function downloadAsImage() {
            const card = document.getElementById('resultCard');
            const btn = document.getElementById('dlBtn');
            
            // إخفاء الزرار مؤقتاً عشان ميبانش في الصورة
            btn.style.visibility = 'hidden';

            html2canvas(card, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `كارت_${document.getElementById('resName').innerText}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.style.visibility = 'visible';
            });
        }
    </script>
</body>
</html>

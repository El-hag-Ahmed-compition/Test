<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كارت المتسابق</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #002D04; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .search-box { width: 100%; max-width: 400px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; border: 2px solid #D4AF37; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; text-align: center; font-size: 16px; }
        .btn-search { width: 100%; padding: 12px; background-color: #D4AF37; color: #002D04; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* تصميم الكارت */
        #studentCard { 
            display: none; 
            width: 100%; max-width: 350px; 
            background-color: #002D04; 
            border: 5px solid #D4AF37; 
            border-radius: 20px; 
            padding: 20px; 
            box-sizing: border-box; 
            text-align: center;
            background-image: linear-gradient(45deg, rgba(212,175,55,0.05) 25%, transparent 25%); /* زخرفة خفيفة */
        }
        .card-title { color: #D4AF37; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.5rem; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px; }
        .label { color: #D4AF37; font-weight: bold; }
        
        /* زرار التنزيل */
        .btn-download { 
            display: none; 
            margin-top: 20px; 
            width: 100%; max-width: 350px; 
            padding: 15px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="search-box">
        <h2>استعلام النتيجة</h2>
        <input type="text" id="studentCode" placeholder="أدخل الكود">
        <button class="btn-search" onclick="checkStatus()" id="searchBtn">بحث</button>
    </div>

    <div id="studentCard">
        <div class="card-title">مسابقة الحاج أحمد</div>
        <div class="info-row"><span class="label">الاسم:</span> <span id="resName"></span></div>
        <div class="info-row"><span class="label">المستوى:</span> <span id="resLevel"></span></div>
        <div class="info-row"><span class="label">المرحلة 1:</span> <span id="resScore1"></span></div>
        <div class="info-row"><span class="label">المرحلة 2:</span> <span id="resScore2"></span></div>
        <div style="margin-top:15px; font-size: 12px; color: #D4AF37;">كود الطالب: <span id="resCode"></span></div>
    </div>

    <button class="btn-download" id="downloadBtn" onclick="downloadCard()">⬇️ تنزيل الكارت كصورة</button>

    <script>
        function checkStatus() {
            const code = document.getElementById('studentCode').value;
            const scriptURL = "رابط_الـ_WEB_APP_بتاعك_هنا";

            if(!code) return alert("اكتب الكود!");

            document.getElementById('searchBtn').innerText = "جاري البحث...";
            
            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('searchBtn').innerText = "بحث";
                    if(data.status === "found") {
                        document.getElementById('resName').innerText = data.name;
                        document.getElementById('resLevel').innerText = data.level;
                        document.getElementById('resScore1').innerText = data.score1;
                        document.getElementById('resScore2').innerText = data.score2;
                        document.getElementById('resCode').innerText = code;
                        
                        document.getElementById('studentCard').style.display = "block";
                        document.getElementById('downloadBtn').style.display = "block";
                    } else {
                        alert("الكود غير صحيح");
                    }
                });
        }

        // دالة تنزيل الكارت
        function downloadCard() {
            const card = document.getElementById('studentCard');
            html2canvas(card).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Student-Card.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>

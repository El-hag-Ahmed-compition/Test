<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استعلام عن النتيجة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { background-color: #002D04; margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* صندوق البحث */
        .search-box { width: 95%; max-width: 400px; border: 2px solid #D4AF37; border-radius: 20px; padding: 20px; margin-top: 30px; text-align: center; }
        .title { color: #D4AF37; font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        .input-row { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; text-align: center; font-size: 16px; font-weight: bold; }
        .btn-search { background-color: #D4AF37; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* شاشة النتيجة (اللي هتظهر للطالب) */
        #resultDisplay { 
            display: none; 
            background-color: white; 
            border-radius: 15px; 
            padding: 25px; 
            text-align: right; 
            width: 95%; 
            max-width: 400px; 
            margin-top: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .st-name { font-size: 22px; font-weight: bold; color: black; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .st-info { color: #333; margin-bottom: 10px; font-size: 17px; font-weight: bold; }
        .green-txt { color: #28a745; }
        .blue-txt { color: #007bff; }
        .gold-txt { color: #D4AF37; }

        /* الزرار الأخضر للتحميل */
        .btn-download { 
            background-color: #002D04; 
            color: #D4AF37; 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 20px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }

        /* --- الكارت الرسمي (مخفي تماماً عن الطالب) --- */
        #hiddenCard { position: absolute; left: -9999px; width: 600px; height: 300px; background-color: white; }
        .c-header { background-color: #002D04; color: #D4AF37; padding: 10px; text-align: center; font-weight: bold; font-size: 22px; border-bottom: 4px solid #D4AF37; }
        .c-middle { display: flex; padding: 20px; align-items: center; justify-content: space-between; }
        .c-data { text-align: right; color: black; font-size: 18px; font-weight: bold; line-height: 1.8; width: 65%; }
        .c-qrcode { width: 140px; height: 140px; border: 2px solid #002D04; }
        .c-footer { background-color: #D4AF37; color: black; padding: 8px; text-align: center; font-weight: bold; font-size: 16px; position: absolute; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div class="search-box">
        <div class="title">استعلام عن نتيجة</div>
        <div class="input-row">
            <button class="btn-search" onclick="doSearch()">بحث</button>
            <input type="text" id="codeInp" placeholder="">
        </div>
    </div>

    <div id="resultDisplay">
        <div class="st-name" id="resName"></div>
        <div class="st-info">المستوى: <span id="resLevel"></span></div>
        <div class="st-info">الكود: <span class="gold-txt" id="resCode"></span></div>
        <div class="st-info">المرحلة الأولى: <span class="green-txt" id="resS1"></span></div>
        <div class="st-info">المرحلة الثانية: <span class="blue-txt" id="resS2"></span></div>

        <button class="btn-download" onclick="downloadImage()">
            تحميل الكارت ⬇️
        </button>
    </div>

    <div id="hiddenCard">
        <div class="c-header">بطاقة متسابق | مسجد الحاج أحمد الملهود</div>
        <div class="c-middle">
            <div id="qrPlace" class="c-qrcode"></div>
            <div class="c-data">
                <div>الاسم: <span id="cName"></span></div>
                <div>النوع: ذكر</div>
                <div>المستوى: <span id="cLevel"></span></div>
                <div style="color:#D4AF37">الكود: <span id="cCode"></span></div>
            </div>
        </div>
        <div class="c-footer">يرجى إبراز الكارت عند دخول الاختبارات</div>
    </div>

    <script>
        function doSearch() {
            const code = document.getElementById('codeInp').value;
            const scriptURL = "https://script.google.com/macros/s/AKfycbznMFgTerw3GS-8uzqef-uVy0Ul1eqTalHzqe6qOLf1GM9YptBdnFirJcX8TC2lqJ0FPA/exec"; 

            if(!code) return alert("دخل الكود الأول!");

            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "found") {
                    // 1. ملء بيانات شاشة النتيجة
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resLevel').innerText = data.level;
                    document.getElementById('resCode').innerText = code;
                    document.getElementById('resS1').innerText = data.score1 || "قيد المراجعة";
                    document.getElementById('resS2').innerText = data.score2 || "قيد الانتظار";

                    // 2. ملء بيانات الكارت المخفي
                    document.getElementById('cName').innerText = data.name;
                    document.getElementById('cLevel').innerText = data.level;
                    document.getElementById('cCode').innerText = code;
                    
                    // توليد QR الكارت
                    $('#qrPlace').empty().qrcode({ text: code, foreground: "#002D04", width: 140, height: 140 });

                    // إظهار النتيجة للطالب
                    document.getElementById('resultDisplay').style.display = "block";
                } else {
                    alert("عفواً.. الكود غير موجود!");
                }
            });
        }

        function downloadImage() {
            const card = document.getElementById('hiddenCard');
            const student = document.getElementById('resName').innerText;

            html2canvas(card, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `كارت_${student}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم الإدارة | مسجد الملهود</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --gold: #fdb931;
            --dark-green: #06301d;
            --light-green: #0a4d2e;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at center, var(--light-green) 0%, var(--dark-green) 100%);
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px;
        }

        .admin-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 20px;
        }

        h2 { color: var(--gold); font-weight: 900; font-size: 1.6rem; margin-top: 0; margin-bottom: 20px; }
        h3 { color: #fff; font-weight: 700; font-size: 1.15rem; margin-top: 0; margin-bottom: 15px; text-align: right; border-right: 3px solid var(--gold); padding-right: 8px; }
        
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; color: #dfdfdf; }
        
        .input-style {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        .input-style:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(253, 185, 49, 0.3); }

        .btn-action {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--gold), #ffcb65);
            color: var(--dark-green);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(253, 185, 49, 0.2);
        }
        .btn-action:disabled { background: #777; color: #ccc; cursor: not-allowed; box-shadow: none; }

        /* --- [إضافة جديدة]: تصميم بطاقات الإحصائيات الذكية --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px 5px;
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card i { font-size: 1.2rem; margin-bottom: 5px; display: block; }
        .stat-card .stat-value { font-size: 1.4rem; font-weight: 900; block-size: auto; }
        .stat-card .stat-label { font-size: 0.75rem; color: #cdcdcd; font-weight: 600; }
        
        /* ألوان البطاقات */
        .stat-total i { color: var(--gold); }
        .stat-total .stat-value { color: var(--gold); }
        .stat-qualified i { color: #2ecc71; }
        .stat-qualified .stat-value { color: #2ecc71; }
        .stat-not-qualified i { color: #e74c3c; }
        .stat-not-qualified .stat-value { color: #e74c3c; }

        /* منطقة التحكم العام بالنتائج */
        .global-control-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(253, 185, 49, 0.4);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }
        .btn-publish { background: #2ecc71; color: white; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2); }
        .btn-hide-results { background: #e67e22; color: white; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.2); }

        /* منطقة عرض بيانات الطالب */
        .student-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(253, 185, 49, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            text-align: right;
            display: none;
        }
        .info-row { margin-bottom: 10px; font-size: 1.05rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .info-row span { color: var(--gold); font-weight: 700; }

        /* الأزرار الملونة للمراحل */
        .select-wrapper { margin-top: 15px; }
        .select-style {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: var(--dark-green);
            color: #fff;
            border: 1px solid var(--gold);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
            text-align-last: center;
        }

        .btn-save { background: #2ecc71; color: white; margin-top: 10px; }
        .btn-reset { background: #e74c3c; color: white; margin-top: 10px; }
        .btn-archive { background: #7f8c8d; color: white; margin-top: 30px; }

        .status-message { margin-top: 15px; font-weight: 700; font-size: 1.05rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div id="lockArea">
            <h2><i class="fas fa-lock"></i> خزنة الإدارة السرية</h2>
            <div class="input-group">
                <label>أدخل كلمة مرور الإدارة لو تكرمت:</label>
                <input type="password" id="adminPass" class="input-style" placeholder="••••••••">
            </div>
            <button class="btn-action" onclick="checkPassword()">دخول اللوحة</button>
        </div>

        <div id="controlArea" style="display: none;">
            <h2><i class="fas fa-user-shield"></i> لوحة التحكم والتحكيم</h2>
            
            <div class="stats-grid">
                <div class="stat-card stat-total">
                    <i class="fas fa-users"></i>
                    <div class="stat-value" id="statTotal">--</div>
                    <div class="stat-label">إجمالي المسجلين</div>
                </div>
                <div class="stat-card stat-qualified">
                    <i class="fas fa-user-check"></i>
                    <div class="stat-value" id="statQualified">--</div>
                    <div class="stat-label">المؤهلين م1</div>
                </div>
                <div class="stat-card stat-not-qualified">
                    <i class="fas fa-user-times"></i>
                    <div class="stat-value" id="statNotQualified">--</div>
                    <div class="stat-label">غير المؤهلين</div>
                </div>
            </div>
            
            <div class="global-control-box">
                <h3><i class="fas fa-bullhorn"></i> التحكم الجماعي بالنتائج</h3>
                <div style="font-size: 0.85rem; color: #ccc; text-align: right; margin-bottom: 10px;">التحكم في ظهور أو إخفاء نتائج جميع الطلاب بضغطة زر واحدة:</div>
                <div class="grid-buttons">
                    <button class="btn-action btn-publish" id="btnPublishAll" onclick="toggleGlobalResults('معلنة')">
                        <i class="fas fa-eye"></i> إعلان النتيجة 
                    </button>
                    <button class="btn-action btn-hide-results" id="btnHideAll" onclick="toggleGlobalResults('مخفية')">
                        <i class="fas fa-eye-slash"></i> إخفاء النتيجة
                    </button>
                </div>
            </div>

            <div id="searchBox">
                <h3><i class="fas fa-search"></i> رصد وتعديل طالب محدد</h3>
                <div class="input-group">
                    <label>ابحث بكود الطالب الرقمي:</label>
                    <input type="number" id="studentCode" class="input-style" placeholder="مثال: 11005">
                </div>
                <button class="btn-action" id="btnSearch" onclick="searchStudent()">بحث عن المتسابق</button>
            </div>

            <div class="student-card" id="studentCard">
                <div class="info-row">الاسم: <span id="resName"></span></div>
                <div class="info-row">المستوى: <span id="resLevel"></span></div>
                <div class="info-row">الهاتف: <span id="resPhone"></span></div>
                
                <hr style="border: 0; border-top: 1px dashed rgba(253,185,49,0.3); margin: 15px 0;">

                <div class="select-wrapper">
                    <label><i class="fas fa-star"></i> نتيجة المرحلة الأولى:</label>
                    <select id="stage1Select" class="select-style">
                        <option value="قيد المراجعة">قيد المراجعة</option>
                        <option value="مؤهل">مؤهل 🎉</option>
                        <option value="غير مؤهل">غير مؤهل ❌</option>
                    </select>
                </div>

                <div class="select-wrapper">
                    <label><i class="fas fa-trophy"></i> نتيجة المرحلة الثانية (النهائية):</label>
                    <select id="stage2Select" class="select-style">
                        <option value="لم تبدأ بعد">لم تبدأ بعد</option>
                        <option value="ناجح">ناجح</option>
                        <option value="لم يوفق">لم يوفق</option>
                    </select>
                </div>

                <button class="btn-action btn-save" id="btnSave" onclick="saveStatus()">💾 حفظ التعديلات الجديدة</button>
                <button class="btn-action btn-reset" onclick="resetForm()"><i class="fas fa-redo"></i> بحث عن طالب آخر</button>
            </div>

            <div id="statusMsg" class="status-message"></div>

            <button class="btn-action btn-archive" id="btnArchive" onclick="triggerArchive()">
                <i class="fas fa-folder-open"></i> 📁 تفعيل أرشفة الطلاب غير المؤهلين
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxYkUhcZssdxnt7AyzM5q1fheqe7AQ-OhWQLNcoj1tqEXTtarGCch5kBkZvnE_WI-uNCQ/exec';
        const MASTER_PASSWORD = '12_FA@09sh'; 

        function checkPassword() {
            const passInput = document.getElementById('adminPass').value.trim();
            if (passInput === MASTER_PASSWORD) {
                document.getElementById('lockArea').style.display = 'none';
                document.getElementById('controlArea').style.display = 'block';
                // جلب الإحصائيات فور الدخول الناجح للوحة التحكم
                fetchStats();
            } else {
                alert('عفواً.. كلمة المرور غير صحيحة! حاول مجدداً.');
            }
        }

        // --- [إضافة جديدة]: دالة جلب الإحصائيات من الـ Apps Script وتحديث البطاقات ---
        function fetchStats() {
            fetch(`${scriptURL}?action=getStats`)
            .then(res => res.json())
            .then(data => {
                if(data.total !== undefined) {
                    document.getElementById('statTotal').innerText = data.total;
                    document.getElementById('statQualified').innerText = data.qualified;
                    document.getElementById('statNotQualified').innerText = data.notQualified;
                }
            })
            .catch(err => {
                console.error('خطأ أثناء جلب الإحصائيات:', err);
            });
        }

        function toggleGlobalResults(statusValue) {
            const confirmMsg = statusValue === 'معلنة'
                ? "هل أنت متأكد من إعلان النتيجة للجميع؟ سيتمكن جميع الطلاب من رؤية نتائجهم الحقيقية فوراً." 
                : "هل أنت متأكد من إخفاء النتيجة؟ سيظهر لجميع الطلاب أن النتائج قيد المراجعة والتدقيق.";
            
            if (!confirm(confirmMsg)) return;

            const btnPublish = document.getElementById('btnPublishAll');
            const btnHide = document.getElementById('btnHideAll');
            const statusText = document.getElementById('statusMsg');
            
            btnPublish.disabled = true;
            btnHide.disabled = true;
            statusText.innerText = '⏳ جاري إرسال الأمر وتحديث الخزنة بالشيت...';
            statusText.style.color = '#fdb931';

            const formData = new FormData();
            formData.append('action', 'toggleResults');
            formData.append('status', statusValue);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                btnPublish.disabled = false;
                btnHide.disabled = false;
                if (data.result === 'success') {
                    statusText.innerText = '✅ ' + data.message;
                    statusText.style.color = '#2ecc71';
                    alert(data.message);
                    fetchStats(); // تحديث الإحصائيات احتياطياً
                } else {
                    statusText.innerText = '❌ خطأ: ' + data.message;
                    statusText.style.color = '#e74c3c';
                    alert(data.message);
                }
            })
            .catch(err => {
                btnPublish.disabled = false;
                btnHide.disabled = false;
                statusText.innerText = '❌ فشل الاتصال بالسيرفر، تأكد من الإنترنت.';
                statusText.style.color = '#e74c3c';
            });
        }

        function searchStudent() {
            const code = document.getElementById('studentCode').value.trim();
            if (!code) return alert('برجاء كتابة كود الطالب أولاً!');

            const btnSearch = document.getElementById('btnSearch');
            btnSearch.disabled = true;
            btnSearch.innerText = '🔍 جاري جلب البيانات...';
            document.getElementById('statusMsg').innerText = '';

            fetch(`${scriptURL}?action=checkStatus&code=${code}&isAdmin=true`)
            .then(res => res.json())
            .then(data => {
                btnSearch.disabled = false;
                btnSearch.innerText = 'بحث عن المتسابق';

                if (data.status === 'found') {
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resLevel').innerText = data.level;
                    document.getElementById('resPhone').innerText = data.phone;
                    
                    document.getElementById('stage1Select').value = data.score1 || "قيد المراجعة";
                    document.getElementById('stage2Select').value = data.score2 || "لم تبدأ بعد";

                    document.getElementById('searchBox').style.display = 'none';
                    document.getElementById('studentCard').style.display = 'block';
                } else {
                    alert('عفواً.. هذا الكود الرقمي غير مسجل بقاعدة البيانات حالياً!');
                }
            })
            .catch(err => {
                alert('حدث خطأ في الاتصال بالسيرفر! تأكد من الإنترنت.');
                btnSearch.disabled = false;
                btnSearch.innerText = 'بحث عن المتسابق';
            });
        }

        function saveStatus() {
            const code = document.getElementById('studentCode').value.trim();
            const s1 = document.getElementById('stage1Select').value;
            const s2 = document.getElementById('stage2Select').value;
            const btnSave = document.getElementById('btnSave');
            const statusText = document.getElementById('statusMsg');

            btnSave.disabled = true;
            btnSave.innerText = '⏳ جاري ترحيل التعديلات للشيت...';

            const formData = new FormData();
            formData.append('action', 'updateStatus');
            formData.append('code', code);
            formData.append('stage1', s1);
            formData.append('stage2', s2);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                btnSave.disabled = false;
                btnSave.innerText = '💾 حفظ التعديلات الجديدة';
                
                if (data.result === 'success') {
                    statusText.innerText = '✅ ' + data.message;
                    statusText.style.color = '#2ecc71';
                    alert(data.message);
                    fetchStats(); // تحديث أرقام العدادات فوراً لتعكس التعديل الجديد!
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                alert('حدث خطأ أثناء حفظ البيانات، حاول مرة أخرى!');
                btnSave.disabled = false;
                btnSave.innerText = '💾 حفظ التعديلات الجديدة';
            });
        }

        function resetForm() {
            document.getElementById('studentCode').value = '';
            document.getElementById('statusMsg').innerText = '';
            document.getElementById('studentCard').style.display = 'none';
            document.getElementById('searchBox').style.display = 'block';
            fetchStats(); // تحديث الإحصائيات عند الرجوع للبحث
        }

        function triggerArchive() {
            alert('💡 لتأمين الأرشفة بنسبة 100%، يفضل تشغيلها بضغطة زر واحدة من القائمة العلوية داخل جوجل شيت نفسه (إدارة المسابقة 🏆 -> نقل غير المؤهلين للأرشيف) لضمان عرض رسالة التنبيه بالعدد الدقيق وسرعة المعالجة المتكاملة.');
        }
    </script>
</body>
</html>

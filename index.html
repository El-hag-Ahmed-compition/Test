<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;600;900&display=swap');
        
        :root {
            --gold: #fdb931;
            --dark-bg: #042416;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(253, 185, 49, 0.2);
        }

        body {
            background: radial-gradient(circle at top, #0a4d2e, var(--dark-bg));
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية زخرفية متحركة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.05;
            z-index: -1;
            animation: bgMove 60s linear infinite;
        }

        @keyframes bgMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .hero-section {
            padding: 40px 20px;
            animation: fadeIn 1.2s ease-out;
        }

        .top-title { color: var(--gold); font-weight: 900; font-size: 1.8rem; margin-bottom: 5px; }
        
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 3rem; margin: 20px 0; }

        .quran-verse {
            font-family: 'Amiri Quran', serif;
            font-size: 1.4rem;
            color: #ccc;
            max-width: 500px;
            margin: 0 auto 40px;
            line-height: 1.8;
        }

        /* العداد بشكل عصري */
        .timer-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .timer-grid { display: flex; justify-content: space-around; }
        .timer-box { text-align: center; }
        .timer-num { font-size: 2rem; font-weight: 900; color: var(--gold); display: block; }
        .timer-label { font-size: 0.8rem; opacity: 0.7; }

        /* شبكة الأزرار */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 450px;
        }

        .main-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: var(--dark-bg);
            padding: 22px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(253, 185, 49, 0.3);
            animation: pulse 2s infinite;
        }

        .sub-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .sub-btn i { font-size: 1.5rem; color: var(--gold); }
        .sub-btn:hover { background: rgba(253, 185, 49, 0.1); transform: translateY(-5px); border-color: var(--gold); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 15px 40px rgba(253, 185, 49, 0.5); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .footer { margin-top: auto; padding: 40px; color: var(--gold); font-weight: 600; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="top-title">مسابقة مسجد الحاج أحمد الملهود</div>
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="quran-verse">"قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ"</div>
    </div>

    <div class="timer-card" id="counterArea">
        <div style="margin-bottom: 15px; font-weight: 600; font-size: 1.1rem;">متبقي على الانطلاق</div>
        <div class="timer-grid">
            <div class="timer-box"><span class="timer-num" id="days">00</span><span class="timer-label">يوم</span></div>
            <div class="timer-box"><span class="timer-num" id="hours">00</span><span class="timer-label">ساعة</span></div>
            <div class="timer-box"><span class="timer-num" id="minutes">00</span><span class="timer-label">دقيقة</span></div>
            <div class="timer-box"><span class="timer-num" id="seconds">00</span><span class="timer-label">ثانية</span></div>
        </div>
    </div>

    <div class="nav-grid">
        <a href="register.html" class="main-btn">
            <i class="fas fa-star-and-crescent"></i>
            سجل الآن
        </a>
        <a href="rules.html" class="sub-btn">
            <i class="fas fa-book-open"></i>
            الشروط
        </a>
        <a href="levels.html" class="sub-btn">
            <i class="fas fa-layer-group"></i>
            المستويات
        </a>
        <a href="status.html" class="sub-btn">
            <i class="fas fa-id-card"></i>
            معلومات الطالب
        </a>
        <a href="schedule.html" class="sub-btn">
            <i class="fas fa-clock"></i>
            المواعيد
        </a>
    </div>

    <div class="footer">نحو جيل متقن لكتاب الله</div>

    <script>
        const targetDate = new Date("2026-07-01T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = targetDate - now;
            if (d < 0) return document.getElementById("counterArea").style.display = "none";
            document.getElementById("days").innerText = Math.floor(d / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((d % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>

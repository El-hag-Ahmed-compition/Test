<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;600;900&display=swap');
        
        :root {
            --gold: #fdb931;
            --dark-green: #06301d;
            --light-green: #0a4d2e;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(253, 185, 49, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* --- 1. الخلفية الحية (Animated Mesh Gradient) --- */
        body { 
            background: linear-gradient(135deg, #06301d, #0a4d2e, #06301d, #1a1a00);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* دوائر عائمة شفافة */
        .orb {
            position: fixed;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(253, 185, 49, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { top: -100px; left: -100px; animation-duration: 25s; }
        .orb-2 { bottom: -100px; right: -100px; animation-duration: 30s; }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(100px, 150px); } }

        /* --- 2. تنسيق المحتوى --- */
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 15px 40px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 3. المستطيل العلوي المنفصل --- */
        .top-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 25px;
            margin-top: 15px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        /* لمعة ذهبية متحركة على الحدود */
        .top-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px;
            box-shadow: 0 0 15px var(--gold);
            opacity: 0.1;
            animation: borderGlow 4s infinite;
        }

        @keyframes borderGlow { 0% { opacity: 0.1; } 50% { opacity: 0.4; } 100% { opacity: 0.1; } }

        .top-title { 
            color: var(--gold); 
            font-weight: 800; 
            font-size: 1.5rem; 
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(253, 185, 49, 0.4);
        }
        
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 2.8rem; margin: 20px 0; color: #fff; }

        .quran-verse { 
            font-family: 'Amiri Quran', serif; 
            font-size: 1.3rem; 
            color: rgba(253, 185, 49, 0.9); 
            line-height: 1.8; 
            margin-bottom: 35px;
            padding: 0 10px;
            text-align: center;
        }
        
        /* العداد */
        .timer-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 22px 10px;
            margin-bottom: 35px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .timer-display { display: flex; justify-content: center; gap: 10px; }
        .timer-unit { 
            background: rgba(0,0,0,0.25); 
            padding: 12px 5px; 
            border-radius: 18px; 
            flex: 1; 
            border-bottom: 3px solid var(--gold); 
        }
        .timer-unit span { font-size: 1.6rem; font-weight: 800; color: var(--gold); display: block; }
        .timer-label { font-size: 0.75rem; color: #bbb; margin-top: 5px; }

        /* شبكة الأزرار */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; }

        .btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 22px 10px;
            border-radius: 22px;
            color: #fff;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1rem;
            backdrop-filter: blur(5px);
        }

        .btn i { font-size: 1.6rem; color: var(--gold); }
        
        .btn:hover { background: rgba(253, 185, 49, 0.15); border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(253,185,49,0.2); }

        .reg-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: var(--dark-green) !important;
            font-size: 1.5rem;
            font-weight: 800;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            border: none;
            box-shadow: 0 8px 20px rgba(253,185,49,0.3);
            animation: pulseGlow 2s infinite;
        }
        .reg-btn i { color: var(--dark-green) !important; font-size: 1.5rem; }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 185, 49, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 20px rgba(253, 185, 49, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 185, 49, 0.4); }
        }

        .footer { margin-top: 50px; color: var(--gold); font-weight: 600; opacity: 0.6; font-size: 0.95rem; }

        @media (max-width: 400px) {
            .bismillah { font-size: 2.3rem; }
            .timer-unit span { font-size: 1.3rem; }
            .top-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="top-card">
            <h1 class="top-title">مسابقة مسجد الحاج أحمد الملهود</h1>
        </div>

        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="quran-verse">"قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ"</div>

        <div id="counterArea" class="timer-card">
            <div style="color: var(--gold); margin-bottom: 15px; font-weight: 600; font-size: 0.95rem;">متبقي على انطلاق الاختبارات</div>
            <div class="timer-display">
                <div class="timer-unit"><span id="days">00</span><label class="timer-label">يوم</label></div>
                <div class="timer-unit"><span id="hours">00</span><label class="timer-label">ساعة</label></div>
                <div class="timer-unit"><span id="minutes">00</span><label class="timer-label">دقيقة</label></div>
                <div class="timer-unit"><span id="seconds">00</span><label class="timer-label">ثانية</label></div>
            </div>
        </div>

        <div class="menu-grid">
            <a href="register.html" class="btn reg-btn">
                <i class="fas fa-edit"></i>
                <span>سجل الآن</span>
            </a>
            <a href="rules.html" class="btn">
                <i class="fas fa-scroll"></i>
                <span>الشروط</span>
            </a>
            <a href="levels.html" class="btn">
                <i class="fas fa-trophy"></i>
                <span>المستويات</span>
            </a>
            <a href="status.html" class="btn">
                <i class="fas fa-user-circle"></i>
                <span>بيانات الطالب</span>
            </a>
            <a href="schedule.html" class="btn">
                <i class="fas fa-calendar-alt"></i>
                <span>المواعيد</span>
            </a>
        </div>

        <div class="footer">نحو جيل متقن لكتاب الله تعالى</div>
    </div>

    <script>
        const target = new Date("2026-07-01T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) {
                document.getElementById("counterArea").style.display = "none";
                return;
            }
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;600;900&display=swap');
        
        :root {
            --gold: #fdb931;
            --dark-green: #06301d;
            --light-green: #0a4d2e;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at center, var(--light-green) 0%, var(--dark-green) 100%);
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
            overflow-x: hidden;
        }

        /* --- أنيميشن الخلفية (خفيف جداً على الموبايل) --- */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            background: radial-gradient(circle, rgba(253, 185, 49, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .orb-2 { width: 250px; height: 250px; bottom: 50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 60px); }
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(var(--gold) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            opacity: 0.15;
        }

        /* --- المحتوى الرئيسي --- */
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-box { margin-top: 15px; }
        
        .top-title { 
            color: var(--gold); 
            font-weight: 900; 
            font-size: 1.5rem; 
            text-shadow: 0 0 10px rgba(253,185,49,0.3);
            margin-bottom: 5px;
        }
        
        .bismillah { 
            font-family: 'Amiri Quran', serif; 
            font-size: 2.6rem; 
            margin: 10px 0; 
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .quran-verse { 
            font-family: 'Amiri Quran', serif; 
            font-size: 1.25rem; 
            color: #ddd; 
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 0 5px;
        }
        
        /* كارت العداد */
        .timer-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(253, 185, 49, 0.2);
            border-radius: 25px;
            padding: 20px 10px;
            margin-bottom: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .timer-grid { display: flex; justify-content: center; gap: 8px; }
        .timer-unit { 
            background: rgba(0,0,0,0.3); 
            padding: 12px 2px; 
            border-radius: 15px; 
            flex: 1; 
            border-bottom: 3px solid var(--gold); 
        }
        .timer-unit span { font-size: 1.5rem; font-weight: 900; color: var(--gold); display: block; }
        .timer-label { font-size: 0.7rem; color: #bbb; margin-top: 4px; }

        /* شبكة الأزرار */
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 10px;
            border-radius: 22px;
            color: #fff;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .btn i { font-size: 1.6rem; color: var(--gold); }
        
        .btn:active { transform: scale(0.95); background: rgba(253, 185, 49, 0.1); }

        /* زر التسجيل المميز */
        .reg-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: var(--dark-green) !important;
            font-size: 1.4rem;
            font-weight: 900;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            border: none;
            box-shadow: 0 8px 20px rgba(253,185,49,0.3);
            animation: pulse 2s infinite;
        }
        .reg-btn i { color: var(--dark-green) !important; font-size: 1.4rem; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(253, 185, 49, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(253, 185, 49, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 185, 49, 0); }
        }

        .footer { margin-top: 40px; margin-bottom: 20px; color: var(--gold); font-weight: 600; opacity: 0.6; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="stars"></div>
    </div>

    <div class="container">
        <div class="header-box">
            <div class="top-title">مسابقة مسجد الحاج أحمد الملهود</div>
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div class="quran-verse">"قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ"</div>
        </div>

        <div id="counterArea" class="timer-card">
            <div style="color: var(--gold); margin-bottom: 12px; font-weight: 600; font-size: 0.9rem;">متبقي على انطلاق المسابقة</div>
            <div class="timer-display">
                <div class="timer-unit"><span id="days">00</span><label class="timer-label">يوم</label></div>
                <div class="timer-unit"><span id="hours">00</span><label class="timer-label">ساعة</label></div>
                <div class="timer-unit"><span id="minutes">00</span><label class="timer-label">دقيقة</label></div>
                <div class="timer-unit"><span id="seconds">00</span><label class="timer-label">ثانية</label></div>
            </div>
        </div>

        <div class="nav-menu">
            <a href="register.html" class="btn reg-btn">
                <i class="fas fa-edit"></i>
                <span>سجل الآن</span>
            </a>
            <a href="rules.html" class="btn">
                <i class="fas fa-scroll"></i>
                <span>الشروط</span>
            </a>
            <a href="levels.html" class="btn">
                <i class="fas fa-trophy"></i>
                <span>المستويات</span>
            </a>
            <a href="status.html" class="btn">
                <i class="fas fa-user-circle"></i>
                <span>بيانات الطالب</span>
            </a>
            <a href="schedule.html" class="btn">
                <i class="fas fa-calendar-alt"></i>
                <span>المواعيد</span>
            </a>
        </div>

        <div class="footer">نحو جيل متقن لكتاب الله تعالى</div>
    </div>

    <script>
        const target = new Date("2026-07-01T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) {
                document.getElementById("counterArea").style.display = "none";
                return;
            }
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>

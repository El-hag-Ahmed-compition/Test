<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap');
        
        * { box-sizing: border-box; transition: all 0.3s ease-in-out; }
        
        body { 
            background: radial-gradient(circle at center, #0a4d2e 0%, #06301d 100%);
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            text-align: center;
            overflow-x: hidden;
        }

        /* لمسة زخرفة إسلامية خفيفة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.1;
            z-index: -1;
        }

        .top-title { 
            color: #fdb931; 
            font-weight: bold; 
            font-size: 1.8rem; 
            margin-top: 20px; 
            text-shadow: 0 0 15px rgba(253, 185, 49, 0.4);
            animation: fadeInDown 1s ease;
        }

        .bismillah { 
            font-family: 'Amiri Quran', serif; 
            font-size: 2.8rem; 
            margin: 15px 0; 
            color: #fff;
            animation: fadeIn 1.5s ease;
        }

        .quran-verse { 
            font-family: 'Amiri Quran', serif; 
            font-size: 1.4rem; 
            color: #fdb931; 
            max-width: 450px; 
            line-height: 1.8; 
            margin: 10px auto 30px;
            opacity: 0.9;
        }
        
        /* العداد التنازلي المطور */
        .countdown-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(253, 185, 49, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .timer-display { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
        }

        .timer-unit { 
            background: rgba(253, 185, 49, 0.1);
            padding: 10px;
            border-radius: 12px;
            min-width: 70px;
            border: 1px solid rgba(253, 185, 49, 0.2);
        }

        .timer-unit span { font-size: 1.8rem; font-weight: bold; color: #fdb931; display: block; }
        .timer-label { color: #eee; font-size: 0.75rem; margin-top: 5px; font-weight: normal; }

        /* شبكة الأزرار */
        .buttons-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%; 
            max-width: 420px; 
        }

        .btn { 
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(253, 185, 49, 0.4);
            color: #fff; 
            padding: 18px 10px; 
            border-radius: 18px; 
            font-weight: bold; 
            font-size: 1rem; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover { 
            background: #fdb931; 
            color: #06301d; 
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(253, 185, 49, 0.4);
        }

        .register-btn { 
            grid-column: span 2; 
            background: linear-gradient(135deg, #fdb931 0%, #b8860b 100%); 
            color: #06301d; 
            font-size: 1.5rem; 
            border-radius: 20px; 
            margin-bottom: 5px;
            animation: pulse 2s infinite;
            border: none;
        }

        .footer-note { 
            margin-top: auto; 
            color: #fdb931; 
            font-weight: bold; 
            font-size: 1.2rem; 
            padding: 30px 0; 
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(253, 185, 49, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(253, 185, 49, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 185, 49, 0); }
        }

        @media (max-width: 400px) {
            .top-title { font-size: 1.4rem; }
            .bismillah { font-size: 2.2rem; }
            .timer-unit { min-width: 60px; }
        }
    </style>
</head>
<body>
    <div class="top-title">مسابقة مسجد الحاج أحمد الملهود</div>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div class="quran-verse">قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ</div>

    <div id="counterArea" class="countdown-container">
        <div style="color: #fdb931; margin-bottom: 12px; font-weight: bold;">متبقي على انطلاق المسابقة</div>
        <div class="timer-display">
            <div class="timer-unit"><span id="days">00</span><label class="timer-label">يوم</label></div>
            <div class="timer-unit"><span id="hours">00</span><label class="timer-label">ساعة</label></div>
            <div class="timer-unit"><span id="minutes">00</span><label class="timer-label">دقيقة</label></div>
            <div class="timer-unit"><span id="seconds">00</span><label class="timer-label">ثانية</label></div>
        </div>
    </div>

    <div class="buttons-grid">
        <a href="register.html" class="btn register-btn" id="regBtn">✨ سجل الآن بالمسابقة ✨</a>
        <a href="rules.html" class="btn">📜 الشروط</a>
        <a href="levels.html" class="btn">🏆 المستويات</a>
        <a href="status.html" class="btn">🔍 معلومات الطالب</a>
        <a href="schedule.html" class="btn">📅 المواعيد</a>
    </div>

    <div class="footer-note">نحو جيل متقن لكتاب الله</div>

    <script>
        const targetDate = new Date("2026-07-01T00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("counterArea").style.display = "none";
            }
        }, 1000);
    </script>
</body>
</html>
